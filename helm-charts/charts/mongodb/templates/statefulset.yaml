# ──────────────────────────────────────────────────────────────────────────────
# charts/mongodb/templates/statefulset.yaml
# MongoDB StatefulSet with NFS-backed persistent storage
# Values consumed from root values.yaml → .Values["mongodb"].*
# ──────────────────────────────────────────────────────────────────────────────
{{- $db := index .Values "mongodb" }}
{{- $global := .Values.global }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: {{ $global.namespace }}
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: {{ $global.partOf }}
    app.kubernetes.io/component: database
    app.kubernetes.io/version: {{ $db.image.tag | quote }}
spec:
  serviceName: mongodb-headless       # must match the headless Service name
  replicas: {{ $db.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/part-of: {{ $global.partOf }}
        app.kubernetes.io/component: database
    spec:
      securityContext:
        fsGroup: 999            # mongodb group in the official image
        runAsNonRoot: false     # mongo image needs root during init
      terminationGracePeriodSeconds: 30
      containers:
        - name: mongodb
          image: "{{ $db.image.repository }}:{{ $db.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongodb
              containerPort: {{ $db.port }}
              protocol: TCP

          # ── Root credentials from Secret ────────────────────────────────────
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_ROOT_PASSWORD

          resources:
            requests:
              cpu: {{ $db.resources.requests.cpu | quote }}
              memory: {{ $db.resources.requests.memory | quote }}
            limits:
              cpu: {{ $db.resources.limits.cpu | quote }}
              memory: {{ $db.resources.limits.memory | quote }}

          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db

          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: {{ $db.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ $db.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ $db.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ $db.probes.liveness.failureThreshold }}

          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: {{ $db.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ $db.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ $db.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ $db.probes.readiness.failureThreshold }}

  # ── Volume Claim Template (NFS-backed storage) ──────────────────────────────
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
        labels:
          app.kubernetes.io/name: mongodb
          app.kubernetes.io/part-of: {{ $global.partOf }}
      spec:
        accessModes:
          - {{ $db.storage.accessMode }}
        storageClassName: {{ $db.storage.storageClassName }}
        resources:
          requests:
            storage: {{ $db.storage.size }}
