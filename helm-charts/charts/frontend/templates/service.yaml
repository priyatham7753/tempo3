# ──────────────────────────────────────────────────────────────────────────────
# charts/frontend/templates/service.yaml
# Internal DNS: frontend.shopmesh.svc.cluster.local:80
# ──────────────────────────────────────────────────────────────────────────────
{{- $svc := index .Values "frontend" }}
{{- $global := .Values.global }}
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ $global.namespace }}
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: {{ $global.partOf }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      protocol: TCP
      port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
