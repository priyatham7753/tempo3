# ──────────────────────────────────────────────────────────────────────────────
# charts/product-service/templates/secret.yaml
# ──────────────────────────────────────────────────────────────────────────────
{{- $svc := index .Values "product-service" }}
{{- $global := .Values.global }}
apiVersion: v1
kind: Secret
metadata:
  name: product-service-secret
  namespace: {{ $global.namespace }}
  labels:
    app.kubernetes.io/name: product-service
    app.kubernetes.io/part-of: {{ $global.partOf }}
    app.kubernetes.io/component: backend
type: Opaque
data:
  MONGO_URI: {{ $svc.secrets.MONGO_URI }}
