# ──────────────────────────────────────────────────────────────────────────────
# charts/auth-service/templates/service.yaml
# Internal DNS: auth-service.shopmesh.svc.cluster.local:3001
# ──────────────────────────────────────────────────────────────────────────────
{{- $svc := index .Values "auth-service" }}
{{- $global := .Values.global }}
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: {{ $global.namespace }}
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: {{ $global.partOf }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: auth-service
  ports:
    - name: http
      protocol: TCP
      port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
