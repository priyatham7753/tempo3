# =============================================================================
# GLOBAL VALUES — consumed by ALL subcharts via .Values.global.*
# =============================================================================
# Helm automatically injects the `global` block into every subchart.
# Subcharts reference these as:
#   .Values.global.namespaces.backend
#   .Values.global.imageRegistry
#   .Values.global.mongodb.username  etc.
# =============================================================================

global:
  environment: dev
  imageRegistry: docker.io/myrepo   # Replace with your Docker Hub org

  # Fixed functional namespaces — never change per environment
  namespaces:
    frontend: frontend
    backend:  backend
    database: database
    gateway:  gateway

  # MongoDB root credentials — shared across all 3 MongoDB instances
  mongodb:
    username: admin
    password: secret123             # Change before deploying

  # JWT signing secret — must be 32+ characters
  jwtSecret: "ShopMesh_JWT_Secret_Change_Me_Now_32"

  # Resource defaults applied to all microservice containers
  resources:
    requests:
      cpu:    "100m"
      memory: "128Mi"
    limits:
      cpu:    "500m"
      memory: "512Mi"

# =============================================================================
# SUBCHART ENABLE TOGGLES
# =============================================================================
frontend:
  enabled: true

auth-service:
  enabled: true

product-service:
  enabled: true

order-service:
  enabled: true

mongodb-auth:
  enabled: true

mongodb-product:
  enabled: true

mongodb-order:
  enabled: true

# =============================================================================
# SUBCHART DEFAULT VALUES
# These merge with (and can be overridden by) values-dev.yaml / values-prod.yaml
# The 'global' block above is passed into all subcharts automatically by Helm.
# =============================================================================

frontend:
  enabled: true
  replicaCount: 1
  image:
    tag: "latest"
    pullPolicy: IfNotPresent
  port: 80
  service:
    type: ClusterIP
    port: 80
  env:
    REACT_APP_AUTH_URL:    "/api/auth"
    REACT_APP_PRODUCT_URL: "/api/products"
    REACT_APP_ORDER_URL:   "/api/orders"

auth-service:
  enabled: true
  replicaCount: 1
  image:
    tag: "latest"
    pullPolicy: IfNotPresent
  port: 3001
  service:
    type: ClusterIP
    port: 3001
  env:
    PORT:          "3001"
    NODE_ENV:      "production"
    MONGO_DB_NAME: "authdb"

product-service:
  enabled: true
  replicaCount: 1
  image:
    tag: "latest"
    pullPolicy: IfNotPresent
  port: 3002
  service:
    type: ClusterIP
    port: 3002
  env:
    PORT:          "3002"
    NODE_ENV:      "production"
    MONGO_DB_NAME: "productdb"

order-service:
  enabled: true
  replicaCount: 1
  image:
    tag: "latest"
    pullPolicy: IfNotPresent
  port: 8000
  service:
    type: ClusterIP
    port: 8000
  env:
    MONGO_DB_NAME:       "orderdb"
    AUTH_SERVICE_URL:    "http://auth-service.backend.svc.cluster.local:3001"
    PRODUCT_SERVICE_URL: "http://product-service.backend.svc.cluster.local:3002"

mongodb-auth:
  enabled: true
  fullname:  mongodb-auth
  ownerApp:  auth-service
  database:  authdb
  storage:
    size:             5Gi
    storageClassName: nfs-storage

mongodb-product:
  enabled: true
  fullname:  mongodb-product
  ownerApp:  product-service
  database:  productdb
  storage:
    size:             5Gi
    storageClassName: nfs-storage

mongodb-order:
  enabled: true
  fullname:  mongodb-order
  ownerApp:  order-service
  database:  orderdb
  storage:
    size:             5Gi
    storageClassName: nfs-storage
