apiVersion: v2
name: ecommerce-platform
description: |
  Umbrella Helm chart for the e-commerce microservices platform.
  Manages: frontend, auth-service, product-service, order-service
  and their dedicated MongoDB instances as a single deployable unit.
type: application
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: frontend
    version: "1.0.0"
    repository: "file://charts/frontend"
    condition: frontend.enabled

  - name: auth-service
    version: "1.0.0"
    repository: "file://charts/auth-service"
    condition: auth-service.enabled

  - name: product-service
    version: "1.0.0"
    repository: "file://charts/product-service"
    condition: product-service.enabled

  - name: order-service
    version: "1.0.0"
    repository: "file://charts/order-service"
    condition: order-service.enabled

  - name: mongodb-auth
    version: "1.0.0"
    repository: "file://charts/mongodb-auth"
    condition: mongodb-auth.enabled

  - name: mongodb-product
    version: "1.0.0"
    repository: "file://charts/mongodb-product"
    condition: mongodb-product.enabled

  - name: mongodb-order
    version: "1.0.0"
    repository: "file://charts/mongodb-order"
    condition: mongodb-order.enabled
