# PROD environment overrides — layered on top of values.yaml
# Image tags: semantic version (e.g. v1.0.0)
# Replicas: 2 per service
# Resources: full limits

global:
  environment: prod
  mongodb:
    password: "ProdSecurePassword2024!"   # Use Sealed Secrets in real prod
  resources:
    requests:
      cpu:    "100m"
      memory: "128Mi"
    limits:
      cpu:    "500m"
      memory: "512Mi"

frontend:
  replicaCount: 2
  image:
    tag: "v1.0.0"    # ← updated by CI on every version tag push

auth-service:
  replicaCount: 2
  image:
    tag: "v1.0.0"
  env:
    NODE_ENV: "production"

product-service:
  replicaCount: 2
  image:
    tag: "v1.0.0"
  env:
    NODE_ENV: "production"

order-service:
  replicaCount: 2
  image:
    tag: "v1.0.0"

mongodb-auth:
  storage:
    size: 20Gi

mongodb-product:
  storage:
    size: 20Gi

mongodb-order:
  storage:
    size: 20Gi
