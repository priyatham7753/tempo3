apiVersion: v1
kind: Secret
metadata:
  name: auth-secret
  namespace: {{ .Values.global.namespaces.backend }}
  labels:
    app: auth-service
    environment: {{ .Values.global.environment }}
type: Opaque
data:
  # MONGO_URI is constructed from global values at render time
  MONGO_URI: {{ printf "mongodb://%s:%s@mongodb-auth-0.mongodb-auth-headless.%s.svc.cluster.local:27017/%s" .Values.global.mongodb.username .Values.global.mongodb.password .Values.global.namespaces.database .Values.env.MONGO_DB_NAME | b64enc | quote }}
  JWT_SECRET: {{ .Values.global.jwtSecret | b64enc | quote }}
