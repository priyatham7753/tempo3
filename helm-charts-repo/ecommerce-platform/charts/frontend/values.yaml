# Frontend subchart defaults.
# All values here are overridden by the umbrella chart's values.yaml.
# 'global' block is injected automatically by Helm — do not declare it here.
replicaCount: 1

image:
  tag: "latest"
  pullPolicy: IfNotPresent

port: 80

service:
  type: ClusterIP
  port: 80

env:
  REACT_APP_AUTH_URL:    "/api/auth"
  REACT_APP_PRODUCT_URL: "/api/products"
  REACT_APP_ORDER_URL:   "/api/orders"
