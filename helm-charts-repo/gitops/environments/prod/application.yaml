# =============================================================================
# ArgoCD Application — ecommerce-prod
# =============================================================================
# Uses the umbrella chart with values-prod.yaml overlaid on values.yaml.
# Deploys to the SAME cluster as dev but uses prod image tags (semver v1.0.0).
# Auto-sync is enabled; prune=true removes stale resources automatically.
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    environment: prod
    project: ecommerce-platform
spec:
  project: ecommerce-platform

  source:
    repoURL: https://github.com/myorg/helm-charts-repo
    targetRevision: main
    path: ecommerce-platform

    helm:
      # Base values first, then prod overrides (higher replicas, semver tags)
      valueFiles:
        - values.yaml
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: backend

  syncPolicy:
    automated:
      prune: true       # Remove stale resources
      selfHeal: true    # Revert any manual drift
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
