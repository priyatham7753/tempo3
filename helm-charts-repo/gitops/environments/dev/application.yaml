# =============================================================================
# ArgoCD Application — ecommerce-dev
# =============================================================================
# Uses the umbrella chart with values-dev.yaml overlaid on values.yaml.
# Deploys to the SAME cluster as prod but uses dev image tags (SHA-based).
# Namespaces are functional (frontend/backend/database/gateway) — not dev/prod.
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    environment: dev
    project: ecommerce-platform
spec:
  project: ecommerce-platform

  source:
    repoURL: https://github.com/myorg/helm-charts-repo
    targetRevision: main
    path: ecommerce-platform

    helm:
      # Base values first, then dev overrides
      valueFiles:
        - values.yaml
        - values-dev.yaml

  destination:
    # Single cluster — namespaces are controlled by Helm templates
    server: https://kubernetes.default.svc
    # 'namespace' here is just ArgoCD's default; actual namespaces come from values
    namespace: backend

  syncPolicy:
    automated:
      prune: true       # Remove resources deleted from Git
      selfHeal: true    # Revert manual drift automatically
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
