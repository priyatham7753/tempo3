# =============================================================================
# ArgoCD AppProject — ecommerce-platform
# =============================================================================
# Both dev and prod Argo Applications live under this project.
# Both deploy to the SAME cluster. Namespaces are FUNCTIONAL, not per-env.
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ecommerce-platform
  namespace: argocd
spec:
  description: "E-Commerce Platform — single cluster, functional namespaces"

  sourceRepos:
    - "https://github.com/myorg/helm-charts-repo"

  destinations:
    - namespace: frontend
      server: https://kubernetes.default.svc
    - namespace: backend
      server: https://kubernetes.default.svc
    - namespace: database
      server: https://kubernetes.default.svc
    - namespace: gateway
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: storage.k8s.io
      kind: StorageClass
    - group: gateway.networking.k8s.io
      kind: GatewayClass

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
