# ──────────────────────────────────────────────────────────────────────────────
# mongodb/secret.yaml  — MongoDB credentials (base64-encoded)
#
# IMPORTANT: Replace the values below with your own base64-encoded secrets.
#   echo -n 'your-value' | base64
#
# Defaults encoded here:
#   MONGO_ROOT_USERNAME : admin
#   MONGO_ROOT_PASSWORD : shopmesh-db-password-2024
#   MONGO_URI (auth)    : mongodb://admin:shopmesh-db-password-2024@mongodb-0.mongodb-headless.shopmesh.svc.cluster.local:27017/authdb?authSource=admin
#   MONGO_URI (product) : mongodb://admin:shopmesh-db-password-2024@mongodb-0.mongodb-headless.shopmesh.svc.cluster.local:27017/productdb?authSource=admin
#   MONGO_URI (order)   : mongodb://admin:shopmesh-db-password-2024@mongodb-0.mongodb-headless.shopmesh.svc.cluster.local:27017
#
# Apply: kubectl apply -f k8s/mongodb/secret.yaml
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: shopmesh
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: shopmesh
    app.kubernetes.io/component: database
type: Opaque
