# ──────────────────────────────────────────────────────────────────────────────
# services/auth-service/deployment.yaml  — Auth Service Deployment
#
# Image   : your-registry/auth-service:latest
#           Replace with your actual container registry image.
# Port    : 3001
# Health  : GET /health
#
# Apply: kubectl apply -f k8s/services/auth-service/deployment.yaml
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: shopmesh
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: shopmesh
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/part-of: shopmesh
        app.kubernetes.io/component: backend
    spec:
      # ── Security Context ─────────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      terminationGracePeriodSeconds: 30

      containers:
        - name: auth-service
          image: your-registry/auth-service:latest   # ← Replace with your image
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP

          # ── Environment — non-sensitive from ConfigMap ────────────────────────
          envFrom:
            - configMapRef:
                name: auth-service-config

          # ── Environment — sensitive from Secret ───────────────────────────────
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-service-secret
                  key: JWT_SECRET
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: auth-service-secret
                  key: MONGO_URI

          # ── Resource Requests & Limits ────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ── Liveness Probe ────────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          # ── Readiness Probe ───────────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
