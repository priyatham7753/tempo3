# ──────────────────────────────────────────────────────────────────────────────
# services/auth-service/service.yaml  — ClusterIP Service for Auth
# Internal DNS: auth-service.shopmesh.svc.cluster.local:3001
# Apply: kubectl apply -f k8s/services/auth-service/service.yaml
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: shopmesh
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: shopmesh
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: auth-service
  ports:
    - name: http
      protocol: TCP
      port: 3001
      targetPort: 3001
