# ──────────────────────────────────────────────────────────────────────────────
# services/product-service/networkpolicy.yaml  — Product Service Network Policy
#
# Rules:
#   INGRESS  ← frontend pods (port 3002)
#            ← order-service pods (port 3002)
#            ← ingress-nginx controller pods
#   EGRESS   → auth-service (port 3001)  [JWT validation]
#            → mongodb-headless (port 27017)
#            → kube-dns (port 53)
#
# Apply: kubectl apply -f k8s/services/product-service/networkpolicy.yaml
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: product-service-netpol
  namespace: shopmesh
  labels:
    app.kubernetes.io/name: product-service
    app.kubernetes.io/part-of: shopmesh
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: product-service
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: frontend
      ports:
        - port: 3002
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: order-service
      ports:
        - port: 3002
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3002
          protocol: TCP

  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: auth-service
      ports:
        - port: 3001
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mongodb
      ports:
        - port: 27017
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
