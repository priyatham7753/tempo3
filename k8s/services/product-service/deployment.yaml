# ──────────────────────────────────────────────────────────────────────────────
# services/product-service/deployment.yaml  — Product Service Deployment
#
# Image   : priyatham753/product-service:latest
# Port    : 3002
# Health  : GET /health
#
# Apply: kubectl apply -f k8s/services/product-service/deployment.yaml
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: shopmesh
  labels:
    app.kubernetes.io/name: product-service
    app.kubernetes.io/part-of: shopmesh
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: product-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: product-service
        app.kubernetes.io/part-of: shopmesh
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      terminationGracePeriodSeconds: 30

      containers:
        - name: product-service
          image: priyatham753/product-service:latest   # ← Replace with your image
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3002
              protocol: TCP

          envFrom:
            - configMapRef:
                name: product-service-config

          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: product-service-secret
                  key: MONGO_URI

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
