# ──────────────────────────────────────────────────────────────────────────────
# services/frontend/deployment.yaml  — Frontend (React + Nginx) Deployment
#
# Image   : your-registry/frontend:latest
# Port    : 80 (served by Nginx)
# Health  : GET /
#
# Apply: kubectl apply -f k8s/services/frontend/deployment.yaml
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shopmesh
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: shopmesh
    app.kubernetes.io/component: frontend
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: shopmesh
        app.kubernetes.io/component: frontend
    spec:
      securityContext:
        runAsNonRoot: false   # Nginx needs to bind port 80
      terminationGracePeriodSeconds: 30

      containers:
        - name: frontend
          image: your-registry/frontend:latest   # ← Replace with your image
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          envFrom:
            - configMapRef:
                name: frontend-config

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
