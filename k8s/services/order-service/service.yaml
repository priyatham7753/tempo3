# ──────────────────────────────────────────────────────────────────────────────
# services/order-service/service.yaml  — ClusterIP Service for Order
# Internal DNS: order-service.shopmesh.svc.cluster.local:3003
# Apply: kubectl apply -f k8s/services/order-service/service.yaml
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: shopmesh
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/part-of: shopmesh
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: order-service
  ports:
    - name: http
      protocol: TCP
      port: 3003
      targetPort: 3003
