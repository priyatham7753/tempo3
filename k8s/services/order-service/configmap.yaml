# ──────────────────────────────────────────────────────────────────────────────
# services/order-service/configmap.yaml  — Non-sensitive configuration
# Apply: kubectl apply -f k8s/services/order-service/configmap.yaml
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: shopmesh
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/part-of: shopmesh
    app.kubernetes.io/component: backend
data:
  PORT: "3003"
  NODE_ENV: "production"
  DB_NAME: "orderdb"
  AUTH_SERVICE_URL: "http://auth-service.shopmesh.svc.cluster.local:3001"
  PRODUCT_SERVICE_URL: "http://product-service.shopmesh.svc.cluster.local:3002"
  MONGO_HOST: "mongodb-0.mongodb-headless.shopmesh.svc.cluster.local"
  MONGO_PORT: "27017"
