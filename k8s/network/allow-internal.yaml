# ──────────────────────────────────────────────────────────────────────────────
# network/allow-internal.yaml  — Allow DNS egress for all pods
#
# Every pod in shopmesh needs DNS resolution to discover other services.
# This policy grants kube-dns (UDP/TCP port 53) egress to all pods so they
# can resolve Kubernetes internal Service names without opening all egress.
#
# NOTE: Per-service NetworkPolicies handle application-level traffic rules.
#       This only enables the underlying DNS mechanism.
#
# Apply: kubectl apply -f k8s/network/allow-internal.yaml
# ──────────────────────────────────────────────────────────────────────────────

# ── Allow DNS egress for all pods ────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: shopmesh
  labels:
    app.kubernetes.io/part-of: shopmesh
    app.kubernetes.io/component: network-policy
spec:
  podSelector: {}   # Applies to ALL pods in the namespace
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# ── Allow MongoDB ingress from backend pods only ──────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-mongodb
  namespace: shopmesh
  labels:
    app.kubernetes.io/part-of: shopmesh
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  policyTypes:
    - Ingress
  ingress:
    # Only auth, product, and order services may reach MongoDB
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: auth-service
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: product-service
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: order-service
      ports:
        - port: 27017
          protocol: TCP
